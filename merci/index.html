<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande envoyée | Recherche Fuite Gironde</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<section style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem;">
  <div style="text-align:center;max-width:560px;">
    <div style="width:72px;height:72px;background:rgba(37,99,235,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
      <img src="/assets/icons/tick-circle.svg" alt="" style="width:36px;height:36px;filter:brightness(0) saturate(100%) invert(24%) sepia(88%) saturate(1600%) hue-rotate(211deg) brightness(98%);">
    </div>
    <h1 style="font-family:var(--f-title);font-size:clamp(1.75rem,4vw,2.5rem);color:var(--green-dark);margin-bottom:1rem;">Votre demande a bien été envoyée</h1>
    <p style="font-size:1.0625rem;color:var(--muted);line-height:1.7;margin-bottom:2rem;">Un technicien vous contacte sous 24h ouvrées pour évaluer votre situation et vous proposer un devis adapté.</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:.4rem;font-family:var(--f-body);font-weight:700;font-size:.9375rem;color:var(--green-dark);text-decoration:underline;">&larr; Retour à l'accueil</a>
  </div>
</section>

</html>
